<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="hero-accent" x1="0" y1="0" x2="400" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="180" cy="100" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#23c88a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#hero-bg)" stroke="#30363d" stroke-width="1"/>
  <rect width="900" height="200" rx="12" fill="url(#hero-glow)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#23c88a" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>
  <!-- Z Logo Mark -->
  <g transform="translate(58,16) scale(1.2)">
    <polygon points="65,0 0,140 130,140" fill="#23c88a" opacity="0.85"/>
    <polygon points="0,0 115,132 130,132 130,0" fill="#50df8e" opacity="0.8"/>
    <polygon points="0,12 52,108 0,78" fill="#7feca2" opacity="0.85"/>
    <polygon points="0,12 10,28 38,42 0,78" fill="#86f4a6" opacity="0.8"/>
    <polygon points="70,-5 56,30 4,-5" fill="#5ae39c" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="280" y="80" fill="#e6edf3" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" letter-spacing="0.5">Z-Shell</text>
  <text x="282" y="113" fill="#7feca2" font-family="Arial, Helvetica, sans-serif" font-size="17" opacity="0.85">A Swiss Army Knife for Zsh — Unix Shell</text>
  <!-- Badge pills -->
  <g transform="translate(280,128)">
    <rect x="0" y="0" width="106" height="28" rx="14" fill="#23c88a" opacity="0.1" stroke="#23c88a" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="53" y="19" text-anchor="middle" fill="#7feca2" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="500">Open Source</text>
    <rect x="116" y="0" width="94" height="28" rx="14" fill="#23c88a" opacity="0.1" stroke="#23c88a" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="163" y="19" text-anchor="middle" fill="#7feca2" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="500">90+ Repos</text>
    <rect x="220" y="0" width="108" height="28" rx="14" fill="#23c88a" opacity="0.1" stroke="#23c88a" stroke-width="0.6" stroke-opacity="0.25"/>
    <text x="274" y="19" text-anchor="middle" fill="#7feca2" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="500">Zsh Tooling</text>
  </g>
  <!-- Floating dots (right side) -->
  <circle cx="720" cy="42" r="2.5" fill="#23c88a" opacity="0.2"/>
  <circle cx="750" cy="62" r="1.5" fill="#50df8e" opacity="0.25"/>
  <circle cx="780" cy="38" r="1" fill="#7feca2" opacity="0.3"/>
  <circle cx="700" cy="78" r="2" fill="#5ae39c" opacity="0.15"/>
  <circle cx="810" cy="52" r="1.5" fill="#50df8e" opacity="0.2"/>
  <circle cx="840" cy="72" r="2" fill="#23c88a" opacity="0.15"/>
  <circle cx="760" cy="92" r="1" fill="#7feca2" opacity="0.2"/>
  <circle cx="830" cy="98" r="1.5" fill="#5ae39c" opacity="0.15"/>
  <circle cx="870" cy="42" r="1" fill="#50df8e" opacity="0.2"/>
  <circle cx="690" cy="118" r="2" fill="#23c88a" opacity="0.1"/>
  <circle cx="850" cy="128" r="1.5" fill="#50df8e" opacity="0.12"/>
  <!-- Small geometric accents (right side) -->
  <polygon points="770,118 765,128 775,128" fill="#23c88a" opacity="0.12"/>
  <polygon points="820,148 815,158 825,158" fill="#50df8e" opacity="0.08"/>
  <rect x="740" y="140" width="8" height="8" rx="2" fill="#7feca2" opacity="0.08" transform="rotate(45,744,144)"/>
</svg>
