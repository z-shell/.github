<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="turbo-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="turbo-body" x1="60" y1="18" x2="60" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#turbo-bg)"/>
  <!-- Rocket body -->
  <path d="M60 20 C60 20 44 40 44 62 C44 76 51 84 60 84 C69 84 76 76 76 62 C76 40 60 20 60 20Z" fill="url(#turbo-body)" opacity="0.9"/>
  <!-- Window -->
  <circle cx="60" cy="48" r="6" fill="#fff" opacity="0.35"/>
  <circle cx="60" cy="48" r="3" fill="#0d1117" opacity="0.3"/>
  <!-- Fins -->
  <path d="M44 68 L34 80 L44 76Z" fill="#23c88a" opacity="0.7"/>
  <path d="M76 68 L86 80 L76 76Z" fill="#23c88a" opacity="0.7"/>
  <!-- Exhaust flames -->
  <path d="M52 84 L60 105 L68 84" fill="#7feca2" opacity="0.55"/>
  <path d="M55 84 L60 98 L65 84" fill="#86f4a6" opacity="0.7"/>
  <!-- Speed lines -->
  <line x1="28" y1="32" x2="36" y2="32" stroke="#50df8e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="24" y1="42" x2="34" y2="42" stroke="#50df8e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="26" y1="52" x2="33" y2="52" stroke="#50df8e" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <line x1="84" y1="32" x2="92" y2="32" stroke="#50df8e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="86" y1="42" x2="96" y2="42" stroke="#50df8e" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="87" y1="52" x2="94" y2="52" stroke="#50df8e" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <!-- Particles -->
  <circle cx="18" cy="24" r="2" fill="#50df8e" opacity="0.3"/>
  <circle cx="102" cy="22" r="1.5" fill="#7feca2" opacity="0.3"/>
  <circle cx="16" cy="100" r="1.5" fill="#5ae39c" opacity="0.2"/>
  <circle cx="104" cy="98" r="2" fill="#50df8e" opacity="0.2"/>
</svg>
