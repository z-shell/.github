      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="com-icon" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#com-bg)"/>
  <!-- Connection lines -->
  <line x1="36" y1="52" x2="60" y2="36" stroke="#7feca2" stroke-width="1.5" opacity="0.35"/>
