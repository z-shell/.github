  <path d="M77 63 Q77 58 84 58 Q91 58 91 63" fill="#fff" opacity="0.18" stroke="none"/>
  <!-- Code heart -->
  <path d="M54 86 C54 80 60 78 60 83 C60 78 66 80 66 86 C66 92 60 97 60 97 C60 97 54 92 54 86Z" fill="url(#com-icon)" opacity="0.55"/>
