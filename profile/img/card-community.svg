  <path d="M44 82 L38 90 L44 98" fill="none" stroke="#7feca2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <path d="M76 82 L82 90 L76 98" fill="none" stroke="#7feca2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
