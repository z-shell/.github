<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="eco-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="eco-hex" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#eco-bg)"/>
  <!-- Hexagonal grid — interconnected modules -->
  <!-- Center hexagon (primary) -->
  <polygon points="60,28 76,37 76,55 60,64 44,55 44,37" fill="url(#eco-hex)" opacity="0.8" stroke="#fff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Top-right hex -->
  <polygon points="79,20 91,27 91,41 79,48 67,41 67,27" fill="#23c88a" opacity="0.5" stroke="#fff" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Right hex -->
  <polygon points="79,52 91,59 91,73 79,80 67,73 67,59" fill="#50df8e" opacity="0.5" stroke="#fff" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Bottom hex -->
  <polygon points="60,64 72,71 72,85 60,92 48,85 48,71" fill="#5ae39c" opacity="0.55" stroke="#fff" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Left hex -->
  <polygon points="41,52 53,59 53,73 41,80 29,73 29,59" fill="#7feca2" opacity="0.5" stroke="#fff" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Top-left hex -->
  <polygon points="41,20 53,27 53,41 41,48 29,41 29,27" fill="#86f4a6" opacity="0.5" stroke="#fff" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Faded outer hexagons -->
  <polygon points="79,84 91,91 91,105 79,112 67,105 67,91" fill="#50df8e" opacity="0.15"/>
  <polygon points="41,84 53,91 53,105 41,112 29,105 29,91" fill="#23c88a" opacity="0.15"/>
  <!-- Center Zi mark -->
  <polygon points="60,38 56,46 64,46" fill="#fff" opacity="0.5"/>
  <polygon points="58,46 56,52 64,46" fill="#fff" opacity="0.35"/>
  <!-- Particles -->
  <circle cx="16" cy="18" r="2" fill="#50df8e" opacity="0.3"/>
  <circle cx="104" cy="16" r="1.5" fill="#7feca2" opacity="0.3"/>
  <circle cx="14" cy="102" r="1.5" fill="#5ae39c" opacity="0.2"/>
  <circle cx="106" cy="104" r="2" fill="#50df8e" opacity="0.2"/>
</svg>
