version: 0.1
cli:
  version: 1.25.0
merge:
  required_statuses:
    - Trunk Check
repo:
  repo:
    host: github.com
    owner: z-shell
    name: .github
plugins:
  sources:
    - id: trunk
      uri: https://github.com/trunk-io/plugins
      ref: v1.7.6
lint:
  disabled:
    - terrascan
    - trivy
    - checkov
    - trufflehog
    - yamllint
    - vale
  enabled:
    - oxipng@10.1.0
    - bandit@1.9.4
    - ruff@0.15.11
    - taplo@0.10.0
    - isort@8.0.1
    - flake8@7.3.0
    - black@26.3.1
    - svgo@4.0.1
    - git-diff-check@SYSTEM
    - hadolint@2.14.0
    - actionlint@1.7.12
    - gitleaks@8.30.1
    - markdownlint@0.48.0
    - prettier@3.8.3
    - shfmt@3.6.0
    - shellcheck@0.11.0
  ignore:
    - linters: [svgo]
      paths:
        - "metrics/**"
    - linters: [markdownlint]
      paths:
        - ".github/styles/**"
runtimes:
  enabled:
    - python@3.10.8
    - go@1.21.0
    - node@22.16.0
actions:
  disabled:
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - git-blame-ignore-revs
    - trunk-upgrade-available
    - trunk-cache-prune
    - trunk-announce
    - sh-hook
  definitions:
    - id: sh-hook
      triggers:
        - git_hooks: [pre-push, pre-commit]
      run: .github/hook.sh
