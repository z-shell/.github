---
name: Trunk Code Quality

on:
  workflow_call:
    secrets:
      trunk-token:
        description: >
          Deprecated compatibility input. Trunk Code Quality web app uploads
          are retired; this secret is intentionally ignored.
        required: false
    inputs:
      arguments:
        description: Extra arguments to pass to Trunk Code Quality.
        required: false
        type: string
        default: ""
      cache:
        description: Cache Trunk downloads and linter artifacts on ephemeral runners.
        required: false
        type: boolean
        default: true
      check-mode:
        description: >
          Trunk check mode. Leave empty to let trunk-action infer the correct
          mode for pull_request, push, schedule, and merge queue events. Set to
          'all' only when the caller intentionally wants a full-repository scan.
        required: false
        type: string
        default: ""
      debug:
        description: Enable trunk-action debug mode.
        required: false
        type: boolean
        default: false
      post-init:
        description: Optional shell commands to run after Trunk initialization.
        required: false
        type: string
        default: ""
      runs-on:
        description: Runner label for the Trunk job.
        required: false
        type: string
        default: ubuntu-latest
      setup-command:
        description: Optional shell commands to prepare repository-specific dependencies.
        required: false
        type: string
        default: ""
      setup-deps:
        description: Let trunk-action run .trunk/setup-ci dependency setup.
        required: false
        type: boolean
        default: false
      timeout-seconds:
        description: Kill Trunk after this many seconds. Use 0 to disable timeout.
        required: false
        type: number
        default: 0
      trunk-path:
        description: Optional path to a Trunk launcher binary.
        required: false
        type: string
        default: ""

      # Backward-compatible inputs retained for older caller workflows.
      get_dependencies:
        description: Deprecated; use setup-command.
        required: false
        type: string
        default: ""
      trunk_path:
        description: Deprecated; use trunk-path.
        required: false
        type: string
        default: ""
      upload-series:
        description: Deprecated no-op; Trunk Code Quality uploads are retired.
        required: false
        type: string
        default: ""
      username:
        description: Deprecated no-op retained for compatibility.
        required: false
        type: string
        default: z-shell

permissions:
  contents: read

jobs:
  trunk:
    name: Trunk Code Quality
    runs-on: ${{ inputs.runs-on }}
    permissions:
      actions: read
      checks: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Prepare repository dependencies
        if: ${{ inputs['setup-command'] != '' || inputs.get_dependencies != '' }}
        shell: bash
        run: ${{ inputs['setup-command'] != '' && inputs['setup-command'] || inputs.get_dependencies }}

      - name: Run Trunk Code Quality
        uses: trunk-io/trunk-action@04ba50e7658c81db7356da96657e6e77f220bfa3 # v1.3.1
        with:
          arguments: ${{ inputs.arguments }}
          cache: ${{ inputs.cache }}
          check-mode: ${{ inputs['check-mode'] }}
          debug: ${{ inputs.debug }}
          post-init: ${{ inputs['post-init'] }}
          setup-deps: ${{ inputs['setup-deps'] }}
          timeout-seconds: ${{ inputs['timeout-seconds'] }}
          trunk-path: ${{ inputs['trunk-path'] != '' && inputs['trunk-path'] || inputs.trunk_path }}
