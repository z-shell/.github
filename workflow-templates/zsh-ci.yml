---
name: Zsh CI

on:
  push:
    branches: [$default-branch]
    paths:
      - "**.zsh"
  pull_request:
    branches: [$default-branch]
    paths:
      - "**.zsh"
  workflow_dispatch: {}

jobs:
  zsh-ci:
    uses: z-shell/.github/.github/workflows/zsh-ci.yml@main
    with:
      run-zcompile: false
