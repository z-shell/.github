---
name: Trunk Code Quality

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 05 * * 2"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Trunk Code Quality
    permissions:
      actions: read
      checks: write
      contents: read
    uses: z-shell/.github/.github/workflows/trunk.yml@main
    with:
      # Leave unset to let trunk-action infer changed-files vs all-files mode.
      # For strict full-repository scans, set: check-mode: all
      arguments: --no-progress
